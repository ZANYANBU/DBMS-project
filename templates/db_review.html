<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBMS Review Interface (Terminal Mode)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --accent-color: #00ff00;
            --input-bg: #2d2d2d;
            --border-color: #333;
            --error-color: #ff5555;
            --success-color: #50fa7b;
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Fira Code', 'Courier New', monospace; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 2rem; 
            line-height: 1.5; 
        }
        
        h1 { 
            border-bottom: 1px solid var(--accent-color); 
            padding-bottom: 0.5rem; 
            color: var(--accent-color);
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }

        h1::before { content: "> "; }
        
        .terminal-window {
            border: 1px solid var(--border-color);
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #111;
        }
        
        .terminal-header {
            background: #333;
            padding: 5px 10px;
            display: flex;
            gap: 5px;
            border-bottom: 1px solid #444;
        }
        
        .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }
        
        .control-group { margin: 1.5rem; }
        
        label { 
            display: block; 
            color: #888; 
            margin-bottom: 0.5rem; 
            font-size: 0.9rem;
        }
        
        select, textarea, button { 
            width: 100%; 
            padding: 0.8rem; 
            font-family: 'Fira Code', monospace; 
            font-size: 1rem; 
            box-sizing: border-box; 
            border-radius: 4px;
        }
        
        select {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            cursor: pointer;
        }
        
        textarea { 
            height: 150px; 
            background-color: #000;
            color: var(--success-color);
            border: 1px solid var(--border-color);
            resize: vertical; 
            margin-bottom: 0.5rem;
            padding: 1rem;
        }
        
        button { 
            background-color: var(--accent-color); 
            color: #000; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: all 0.2s;
        }
        
        button:hover { 
            background-color: #32ff32;
            box-shadow: 0 0 10px var(--accent-color);
        }
        
        #results-area { 
            margin: 1.5rem;
            border-top: 1px dashed #444; 
            padding-top: 1rem; 
        }
        
        #output {
            background: #000;
            padding: 1rem;
            border: 1px solid #333;
            min-height: 100px;
            overflow-x: auto;
        }
        
        .status-line { color: #666; font-size: 0.8rem; margin-bottom: 1rem; }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 1rem; 
            font-size: 0.9rem;
        }
        
        th, td { 
            border: 1px solid #444; 
            padding: 0.5rem; 
            text-align: left; 
        }
        
        th { 
            background-color: #222; 
            color: var(--accent-color);
            text-transform: uppercase;
        }
        
        tr:nth-child(even) { background-color: #1a1a1a; }
        
        .error { color: var(--error-color); }
        .success-msg { color: var(--success-color); }
        
        pre { 
            color: #aaa;
            margin: 0;
        }
        
        /* Cursor animation */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--accent-color);
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="terminal-window">
        <!-- Replaced top HTML structure with terminal setup -->
        <div class="terminal-header">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
            <div style="margin-left: 10px; color: #888; font-size: 12px;">user@school-db:~</div>
        </div>
        
        <div style="padding: 1rem;">
            <h1>DBMS Lab Review (Week 4-6)</h1>
            
            <div class="control-group">
                <label for="topic-select">root@db-server:~$ select_module.sh</label>
                <select id="topic-select">
                    <option value="">-- Choose Operation --</option>
                    <option value="setup">0. ./setup_data.sh (Initialize DB)</option>
                    <option value="aggregates">1. Week 4: Aggregate Functions</option>
                    <option value="union">2. Week 4: Set Operations (UNION)</option>
                    <option value="subquery">3. Week 5: Subqueries</option>
                    <option value="joins">4. Week 5: JOIN Operations</option>
                    <option value="create_view">5. Week 5: Create View</option>
                    <option value="select_view">6. Week 5: Query View</option>
                    <option disabled>--- Week 6 (MySQL Only) ---</option>
                    <option value="week6_procedure">7. Week 6: Procedure (Exception Handling)</option>
                    <option value="week6_function">8. Week 6: Function (Deterministic)</option>
                    <option value="week6_cursor">9. Week 6: Cursor (Row-by-Row)</option>
                    <option value="week6_trigger">10. Week 6: Trigger (Min Salary)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="sql-query">root@db-server:~$ execute_sql.py</label>
                <textarea id="sql-query" spellcheck="false" placeholder="Enter SQL command..."></textarea>
                <button id="execute-btn">RUN COMMAND</button>
            </div>

            <div id="results-area">
                <div class="status-line">root@db-server:~$ cat output.log</div>
                <div id="output">
                    <span style="color: #666"># Ready to execute queries...</span><br>
                    <span class="cursor"></span>
                </div>
            </div>
        </div>
    </div>

    DECLARE done INT DEFAULT 0;
    DECLARE v_name VARCHAR(50);
    DECLARE emp_cursor CURSOR FOR SELECT emp_name FROM EMPLOYEE;
    DECLARE CONTINUE HANDLER FOR NOT FOUND SET done = 1;

        const select = document.getElementById('topic-select');
        const textarea = document.getElementById('sql-query');
        const executeBtn = document.getElementById('execute-btn');
        const output = document.getElementById('output');

        select.addEventListener('change', (e) => {
            const key = e.target.value;
            if (queries[key]) {
                textarea.value = queries[key];
            } else {
                textarea.value = '';
            }
        });

        executeBtn.addEventListener('click', async () => {
            const sql = textarea.value.trim();
            if (!sql) return;

            // Check if this is a MySQL-only script
            if (sql.includes('DELIMITER $$')) {
                output.innerHTML = `<span style="color: #ffbd2e; font-weight: bold;">WARN: MySQL/PL-SQL Syntax Detected.</span><br>
<span style="color: #888;">This code contains stored procedures/triggers which are not supported in the local execution environment (SQLite).</span><br><br>
<span style="color: var(--success-color);">Action: Code is ready on clipboard. Switch to your MySQL terminal and paste it.</span><br><span class="cursor"></span>`;
                return;
            }

            output.innerHTML = '<span style="color: yellow">Executing...</span><span class="cursor"></span>';
            
            try {
                const response = await fetch('/db-review/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'sql=' + encodeURIComponent(sql)
                });

                const result = await response.json();

                if (result.status === 'error') {
                    output.innerHTML = `<div class="error">Error: ${result.message}</div><span class="cursor"></span>`;
                } else if (result.data) {
                    renderTable(result.data);
                } else {
                    output.innerHTML = `<span class="success-msg">${result.message}</span><br><span class="cursor"></span>`;
                }
            } catch (err) {
                output.innerHTML = `<div class="error">Network Error: ${err.message}</div><span class="cursor"></span>`;
            }
        });

        function renderTable(data) {
            if (!data || data.length === 0) {
                output.innerHTML = '<span style="color: yellow">Query executed successfully. 0 rows affected.</span><br><span class="cursor"></span>';
                return;
            }

            const columns = Object.keys(data[0]);
            const colWidths = {};
            
            // Calculate max width for each column
            columns.forEach(col => {
                let max = col.length;
                data.forEach(row => {
                    const len = String(row[col] === null ? 'NULL' : row[col]).length;
                    if (len > max) max = len;
                });
                colWidths[col] = max + 2; // Add padding
            });

            // Build Separator
            let separator = '+';
            columns.forEach(col => separator += '-'.repeat(colWidths[col]) + '+');

            // Build Header
            let header = '|';
            columns.forEach(col => {
                header += ' ' + col.padEnd(colWidths[col]-1, ' ') + '|';
            });

            let table = separator + '\n' + header + '\n' + separator + '\n';

            // Build Rows
            data.forEach(row => {
                let r = '|';
                columns.forEach(col => {
                    const val = String(row[col] === null ? 'NULL' : row[col]);
                    r += ' ' + val.padEnd(colWidths[col]-1, ' ') + '|';
                });
                table += r + '\n';
            });
            table += separator;

            output.innerHTML = `<pre style="color: var(--success-color); font-family: 'Fira Code', monospace; font-size: 0.9rem;">${table}</pre><br><span class="cursor"></span>`;
        }
    </script>
