{% extends "base.html" %}

{% block title %}Error {{ code }}{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card text-center">
        <h1 style="font-size: 4rem; color: #ef4444;">{{ code }}</h1>
        <h2>{{ error }}</h2>
        <p style="margin: 1.5rem 0; color: #64748b;">The page you're looking for doesn't exist or you don't have permission to access it.</p>
        <a href="{{ url_for('dashboard') if session.user_id else url_for('index') }}" class="btn btn-primary">
            Go Back Home
        </a>
    </div>
</div>
{% endblock %}
