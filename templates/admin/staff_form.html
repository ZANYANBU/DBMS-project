{% extends "base.html" %}

{% block title %}{{ 'Edit' if staff else 'Add' }} Staff{% endblock %}

{% block content %}
<div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
        <ul class="sidebar-menu">
            <li class="sidebar-item">
                <a href="{{ url_for('admin_dashboard') }}" class="sidebar-link">
                    📊 Dashboard
                </a>
            </li>
            <li class="sidebar-item">
                <a href="{{ url_for('admin_students') }}" class="sidebar-link">
                    👨‍🎓 Students
                </a>
            </li>
            <li class="sidebar-item">
                <a href="{{ url_for('admin_staff') }}" class="sidebar-link active">
                    👨‍🏫 Staff
                </a>
            </li>
            <li class="sidebar-item">
                <a href="{{ url_for('admin_courses') }}" class="sidebar-link">
                    📚 Courses
                </a>
            </li>
            <li class="sidebar-item">
                <a href="{{ url_for('admin_classes') }}" class="sidebar-link">
                    🏫 Classes
                </a>
            </li>
            <li class="sidebar-item">
                <a href="{{ url_for('admin_enrollments') }}" class="sidebar-link">
                    📝 Enrollments
                </a>
            </li>
        </ul>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">{{ 'Edit' if staff else 'Add New' }} Staff</h1>
            <a href="{{ url_for('admin_staff') }}" class="btn btn-secondary">← Back to Staff</a>
        </div>
        
        <div class="card">
            <form method="POST">
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem;">
                    <div class="form-group">
                        <label for="first_name" class="form-label">First Name *</label>
                        <input type="text" id="first_name" name="first_name" class="form-control" 
                               value="{{ staff.First_Name if staff else '' }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="last_name" class="form-label">Last Name *</label>
                        <input type="text" id="last_name" name="last_name" class="form-control" 
                               value="{{ staff.Last_Name if staff else '' }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email" class="form-label">Email *</label>
                        <input type="email" id="email" name="email" class="form-control" 
                               value="{{ staff.Email if staff else '' }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="designation" class="form-label">Designation *</label>
                        <select id="designation" name="designation" class="form-control" required>
                            <option value="">Select Designation</option>
                            <option value="Principal" {{ 'selected' if staff and staff.Designation == 'Principal' else '' }}>Principal</option>
                            <option value="Vice Principal" {{ 'selected' if staff and staff.Designation == 'Vice Principal' else '' }}>Vice Principal</option>
                            <option value="HOD" {{ 'selected' if staff and staff.Designation == 'HOD' else '' }}>HOD</option>
                            <option value="Teacher" {{ 'selected' if staff and staff.Designation == 'Teacher' else '' }}>Teacher</option>
                            <option value="Lab Assistant" {{ 'selected' if staff and staff.Designation == 'Lab Assistant' else '' }}>Lab Assistant</option>
                            <option value="Admin" {{ 'selected' if staff and staff.Designation == 'Admin' else '' }}>Admin</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="hire_date" class="form-label">Hire Date *</label>
                        <input type="date" id="hire_date" name="hire_date" class="form-control" 
                               value="{{ staff.Hire_Date if staff else '' }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="street_address" class="form-label">Street Address</label>
                        <input type="text" id="street_address" name="street_address" class="form-control" 
                               value="{{ staff.Street_Address if staff else '' }}">
                    </div>
                    
                    <div class="form-group">
                        <label for="city" class="form-label">City</label>
                        <input type="text" id="city" name="city" class="form-control" 
                               value="{{ staff.City if staff else '' }}">
                    </div>
                    
                    <div class="form-group">
                        <label for="zip_code" class="form-label">Zip Code</label>
                        <input type="text" id="zip_code" name="zip_code" class="form-control" 
                               value="{{ staff.Zip_Code if staff else '' }}">
                    </div>
                </div>
                
                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary">{{ 'Update' if staff else 'Add' }} Staff</button>
                    <a href="{{ url_for('admin_staff') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
